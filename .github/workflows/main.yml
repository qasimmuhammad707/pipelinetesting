name: Deploy to EC2

on:
push:
branches:
- main

jobs:
deploy:
runs-on: ubuntu-latest

```
steps:
  - name: Checkout code
    uses: actions/checkout@v4

  - name: Setup SSH key
    run: |
      mkdir -p ~/.ssh
      echo "${{ secrets.EC2_KEY }}" > ~/.ssh/ec2_key.pem
      chmod 600 ~/.ssh/ec2_key.pem

  - name: Add EC2 to known hosts
    run: |
      ssh-keyscan -H ${{ secrets.EC2_HOST }} >> ~/.ssh/known_hosts

  - name: Deploy to EC2
    run: |
      ssh -i ~/.ssh/ec2_key.pem ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} << 'EOF'
        set -e

        echo "Updating application..."

        if [ -d "$HOME/pipelinetesting" ]; then
          cd "$HOME/pipelinetesting"
          git pull origin main
        else
          git clone https://github.com/${{ github.repository }}.git "$HOME/pipelinetesting"
          cd "$HOME/pipelinetesting"
        fi

        echo "Checking Docker..."
        docker --version
        docker compose version

        echo "Stopping old containers..."
        docker compose down || true

        echo "Building and starting containers..."
        docker compose up -d --build

        echo "Running containers..."
        docker ps

        echo "Deployment successful!"
      EOF
```
